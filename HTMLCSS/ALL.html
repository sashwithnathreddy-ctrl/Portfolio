<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTMLCSS Index</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #949898;
            color: #000000;
            min-height: 100vh;
        }
        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }
        .grid .container {
            flex: 0 0 23%;
            /* roughly four items per row with some margin */
        }
        .container {
            border: 1px solid #555;
            background-color: #ffffff;
            padding: 10px;
            margin: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height:100px;
            width: 250px;
            box-sizing: border-box;
            border-radius:50px ;
        }
        button {
            padding: 5px 10px;
            cursor: pointer;
            background-color: #eaff00;
            color: #080808;
            border: none;
        }
        button:hover {
            background-color: #444;
        }
        h1 {
            margin-bottom: 0.5em;
        }
        p {
            margin-bottom: 1em;
        }
    </style>
</head>
<body>
    <h1>HTMLCSS Directory</h1>
    <p>Click a button to open the corresponding file:</p>

    <div class="grid">
