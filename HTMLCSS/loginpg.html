<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background: linear-gradient(to bottom, green, blue);
            text-align: center;

        input{
            margin: 5px;
        }
        .btn{
            display: flex;
            flex-direction: row;
            gap: 20px;
            justify-content: center;
            margin: 20px;
        }
        button{
            width: 90px;
            height: 30px;
            border-radius: 10px;
            background-color: rgb(26, 104, 104);
            transition: all 0.3s ease;
            color: white;
        }

            transform: translateY(-5px);

        }


    </style>
</head>
