<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
     <style>
        body {
            font-family: Arial, sans-serif;
            background: #ced8e7;

        h1 {

        }

        }
        figure {
            text-align: center;
        }
        figcaption {
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>

</section>
